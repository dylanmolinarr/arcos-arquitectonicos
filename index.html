<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcos Arquitectónicos - Mapa</title>
    <link rel="icon" type="image/png" href="logo_sin.png">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; color: #333; background-color: #f9f9f9; text-align: center; }
        header { background-color: #f4f4f4; padding: 20px; border-bottom: 2px solid #ddd; }
        .logo { max-width: 200px; }
        .contenedor { max-width: 900px; margin: 40px auto; padding: 20px; }
        .mapa-guatemala { max-width: 100%; height: auto; border: 2px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>

<header>
    <img src="logo_titulo.png" alt="Logo Arcos Arquitectónicos" class="logo">
</header>

<div class="contenedor">
    <h1>Nuestro Alcance Nacional</h1>
    <p>Haz clic en un departamento para abrir una nueva pestaña con los proyectos realizados en esa zona.</p>
    
    <!-- SECCIÓN DEL MAPA ESTÁTICO -->
    <div>
        <img src="mapa-guatemala-limpio.png" alt="Mapa de Guatemala" usemap="#mapaguatemala" class="mapa-guatemala">
        
        <map name="mapaguatemala">
            <!-- Nota: target="_blank" hace que se abra en una nueva pestaña -->
            <!-- Apuntamos al archivo proyectos.html y directo al departamento -->
            <area shape="rect" coords="300,100,500,200" alt="Alta Verapaz" href="proyectos.html#alta-verapaz" target="_blank">
            <area shape="rect" coords="600,150,800,300" alt="Izabal" href="proyectos.html#izabal" target="_blank">
            <area shape="rect" coords="200,50,400,150" alt="Petén" href="proyectos.html#peten" target="_blank">
            <area shape="rect" coords="100,250,250,350" alt="Quetzaltenango" href="proyectos.html#quetzaltenango" target="_blank">
        </map>
    </div>
</div>

</body>
</html>
